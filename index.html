  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .monitor {
      width: 90vw;
      max-width: 1000px;
      height: 85vh;
      background: linear-gradient(145deg, #d4c8a8 0%, #c4b89a 30%, #bfb088 50%, #b8a87c 100%);
      border-radius: 25px 25px 30px 30px;
      padding: 50px 45px 55px 45px;
      box-shadow: 
        0 0 80px rgba(0, 0, 0, 0.5),
        inset 0 2px 5px rgba(255, 255, 255, 0.2),
        inset 0 -5px 20px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .monitor::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 20px;
      background: 
        radial-gradient(circle at 20% 30%, rgba(220, 200, 120, 0.4) 0%, transparent 10%),
        radial-gradient(circle at 80% 70%, rgba(200, 180, 100, 0.3) 0%, transparent 8%),
        radial-gradient(circle at 50% 90%, rgba(190, 170, 90, 0.3) 0%, transparent 12%);
      pointer-events: none;
    }

    .monitor::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    .monitor-logo {
      position: absolute;
      top: 20px;
      right: 60px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 24px;
      color: #8a7a5a;
      text-shadow: 
        1px 1px 0 rgba(255, 255, 255, 0.3),
        -1px -1px 0 rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .monitor-buttons {
      position: absolute;
      bottom: 25px;
      right: 60px;
      display: flex;
      gap: 12px;
    }

    .monitor-button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(145deg, #a09070 0%, #7a6a50 100%);
      box-shadow: 
        inset 0 -2px 4px rgba(0, 0, 0, 0.4),
        inset 0 2px 2px rgba(255, 255, 255, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.3);
      border: 1px solid #5a4a3a;
      position: relative;
    }

    .monitor-button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), transparent);
    }

    .monitor-button.power::after {
      background: radial-gradient(circle at 30% 30%, #4ade80, #22c55e);
      box-shadow: 0 0 6px #4ade80;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #001100 0%, #000800 50%, #000000 100%);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      border: 3px solid #000;
      box-shadow: 
        inset 0 0 80px rgba(0, 20, 0, 0.8),
        inset 0 0 40px rgba(51, 204, 51, 0.2),
        0 0 20px rgba(0, 0, 0, 0.9);
    }

    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 0, 0, 0.3) 51%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 2;
      animation: scanlines 8s linear infinite;
    }

    .screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.3) 60%, rgba(0, 0, 0, 0.9) 100%);
      pointer-events: none;
      z-index: 1;
      border-radius: 12px;
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }

    .content {
      position: relative;
      z-index: 3;
      color: #33cc33;
      text-shadow: 0 0 5px #33cc33, 0 0 10px #33cc33;
      animation: flicker 0.15s infinite alternate;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.98; }
      50% { opacity: 1; }
    }

    /* Accessibility: respect reduced motion preferences */
    @media (prefers-reduced-motion: reduce) {
      .content {
        animation: none;
      }
      .screen::before {
        animation: none;
      }
    }

    .contact-bar {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding-bottom: 6px;
      margin-bottom: 6px;

      justify-content: space-between;
      font-size: 11px;
      padding-bottom: 8px;
      border-bottom: 1px solid #33cc33;
      margin-bottom: 10px;

      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 10px;

    .terminal-output::-webkit-scrollbar {

    .terminal-output::-webkit-scrollbar-track {
      background: #000;
    }

    .terminal-output::-webkit-scrollbar-thumb {
      background: #33cc33;

      margin: 2px 0;

      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;

      font-family: 'Courier New', monospace;

      letter-spacing: 4px;
      text-shadow: 0 0 8px #33cc33, 0 0 16px #33cc33;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 18px;
      border: 1px solid rgba(51, 204, 51, 0.4);
    }

    .pause-indicator.visible {
      opacity: 1;

      const w = ctx.measureText(email).width;
      canvas.width = Math.ceil(w) + 2;
      ctx.font = '11px "Courier New", monospace';
      ctx.fillStyle = '#33cc33';
      ctx.shadowColor = '#33cc33';

    // Pause/resume on click
    let paused = false;
    let pendingFn = null;
    let pendingDelay = null;

    function scheduledTimeout(fn, delay) {
      if (paused) {
        pendingFn = fn;
        pendingDelay = delay;
      } else {
        setTimeout(fn, delay);
      }
    }

    document.addEventListener('click', function(e) {
      if (e.target.closest('a')) return;
      paused = !paused;
      pauseIndicator.classList.toggle('visible', paused);
      if (!paused && pendingFn) {
        const fn = pendingFn;
        const delay = pendingDelay;
        pendingFn = null;
        pendingDelay = null;
        setTimeout(fn, delay);
      }
    });

    // Clock anchored to page load, always ticks forward from the XP date

    const clockBaseDate = new Date('2008-05-12T14:32:00');

      const elapsed = Date.now() - clockPageLoadTime;

      const day = String(xpTime.getDate()).padStart(2, '0');
      const year = String(xpTime.getFullYear()).slice(-2);
      const hours = String(xpTime.getHours()).padStart(2, '0');
      const minutes = String(xpTime.getMinutes()).padStart(2, '0');
      const seconds = String(xpTime.getSeconds()).padStart(2, '0');
      clockEl.textContent = `${month}-${day}-${year} / ${hours}:${minutes}:${seconds}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

      { text: 'C:\\Documents and Settings\\Administrator>', delay: 50, noBreak: true },
      { text: 'logoff', delay: 700, typed: true },
      { text: '', delay: 2500 }
    ];

    let cmdIndex = 0;
    let charIndex = 0;

    let sequenceStartMarker = null;

    function clearAndRestart() {
      // Remove everything before the last sequence start marker,
      // keeping only the most recent complete run visible when scrolling up.
      if (sequenceStartMarker && sequenceStartMarker.parentNode === output) {
        // Remove all children before the marker
        while (output.firstChild && output.firstChild !== sequenceStartMarker) {
          output.removeChild(output.firstChild);
        }
      }

      // Insert a visual separator and mark the start of this new sequence
      const separator = document.createElement('div');
      separator.className = 'line';
      separator.textContent = '';
      output.appendChild(separator);

      sequenceStartMarker = document.createElement('div');
      sequenceStartMarker.className = 'line';
      output.appendChild(sequenceStartMarker);

      cmdIndex = 0;
      charIndex = 0;
      // Scroll to bottom for the fresh start
      output.scrollTop = output.scrollHeight;
      scheduledTimeout(typeCommand, 1000);
    }

    function typeCommand() {
      if (cmdIndex >= commands.length) {
        scheduledTimeout(clearAndRestart, 10000);
        return;
      }

      // Only auto-scroll if the user is already near the bottom.
      // This way, if they've scrolled up to read, we don't yank them away.
      const isNearBottom = (output.scrollHeight - output.scrollTop - output.clientHeight) < 40;

      const cmd = commands[cmdIndex];

      // noBreak: print prompt on its own line, next command appends to it
      if (cmd.noBreak) {
        const line = document.createElement('div');
        line.className = 'line';
        line.textContent = cmd.text;
        output.appendChild(line);
        if (isNearBottom) output.scrollTop = output.scrollHeight;
        cmdIndex++;
        scheduledTimeout(typeCommand, cmd.delay);
        return;
      }

      if (cmd.typed) {
        if (charIndex === 0) {
          output.lastChild.textContent += cmd.text.substring(0, 1);
          charIndex = 1;
          if (isNearBottom) output.scrollTop = output.scrollHeight;
          scheduledTimeout(typeCommand, 80 + Math.random() * 120);
        } else if (charIndex < cmd.text.length) {
          output.lastChild.textContent += cmd.text[charIndex];
          charIndex++;
          if (isNearBottom) output.scrollTop = output.scrollHeight;
          scheduledTimeout(typeCommand, 80 + Math.random() * 120);
        } else {
          const lineBreak = document.createElement('div');
          lineBreak.className = 'line';
          output.appendChild(lineBreak);
          charIndex = 0;
          cmdIndex++;
          if (isNearBottom) output.scrollTop = output.scrollHeight;
          scheduledTimeout(typeCommand, cmd.delay);
        }
      } else {
        const line = document.createElement('div');
        line.className = 'line';
        line.textContent = cmd.text;
        output.appendChild(line);
        if (isNearBottom) output.scrollTop = output.scrollHeight;
        cmdIndex++;
        scheduledTimeout(typeCommand, cmd.delay);
      }
    }

    scheduledTimeout(typeCommand, 500);
  </script>
