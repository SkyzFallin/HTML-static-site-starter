  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .monitor {
      width: 90vw;
      max-width: 1000px;
      height: 85vh;
      background: linear-gradient(145deg, #d4c8a8 0%, #c4b89a 30%, #bfb088 50%, #b8a87c 100%);
      border-radius: 25px 25px 30px 30px;
      padding: 50px 45px 55px 45px;
      box-shadow: 
        0 0 80px rgba(0, 0, 0, 0.5),
        inset 0 2px 5px rgba(255, 255, 255, 0.2),
        inset 0 -5px 20px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .monitor::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 20px;
      background: 
        radial-gradient(circle at 20% 30%, rgba(220, 200, 120, 0.4) 0%, transparent 10%),
        radial-gradient(circle at 80% 70%, rgba(200, 180, 100, 0.3) 0%, transparent 8%),
        radial-gradient(circle at 50% 90%, rgba(190, 170, 90, 0.3) 0%, transparent 12%);
      pointer-events: none;
    }

    .monitor::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    .monitor-logo {
      position: absolute;
      top: 20px;
      right: 60px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 24px;
      color: #8a7a5a;
      text-shadow: 
        1px 1px 0 rgba(255, 255, 255, 0.3),
        -1px -1px 0 rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .monitor-buttons {
      position: absolute;
      bottom: 25px;
      right: 60px;
      display: flex;
      gap: 12px;
    }

    .monitor-button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(145deg, #a09070 0%, #7a6a50 100%);
      box-shadow: 
        inset 0 -2px 4px rgba(0, 0, 0, 0.4),
        inset 0 2px 2px rgba(255, 255, 255, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.3);
      border: 1px solid #5a4a3a;
      position: relative;
    }

    .monitor-button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), transparent);
    }

    .monitor-button.power::after {
      background: radial-gradient(circle at 30% 30%, #4ade80, #22c55e);
      box-shadow: 0 0 6px #4ade80;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #001100 0%, #000800 50%, #000000 100%);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      border: 3px solid #000;
      box-shadow: 
        inset 0 0 80px rgba(0, 20, 0, 0.8),
        inset 0 0 40px rgba(51, 204, 51, 0.2),
        0 0 20px rgba(0, 0, 0, 0.9);
    }

    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 0, 0, 0.3) 51%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 2;
      animation: scanlines 8s linear infinite;
    }

    .screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.3) 60%, rgba(0, 0, 0, 0.9) 100%);
      pointer-events: none;
      z-index: 1;
      border-radius: 12px;
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }

    .content {
      position: relative;
      z-index: 3;
      color: #33cc33;
      text-shadow: 0 0 5px #33cc33, 0 0 10px #33cc33;
      animation: flicker 0.15s infinite alternate;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.98; }
      50% { opacity: 1; }
    }

    .contact-bar {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding-bottom: 6px;
      margin-bottom: 6px;
    }

    .terminal-link {
      color: #33cc33;
      text-decoration: none;
      text-shadow: 0 0 5px #33cc33, 0 0 10px #33cc33;
    }

    .terminal-link:hover {
      color: #66ff66;
      text-shadow: 0 0 8px #66ff66, 0 0 16px #66ff66;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding-bottom: 8px;
      border-bottom: 1px solid #33cc33;
      margin-bottom: 10px;
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 10px;
    }

    .terminal-output::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-output::-webkit-scrollbar-track {
      background: #000;
    }

    .terminal-output::-webkit-scrollbar-thumb {
      background: #33cc33;
    }

    .prompt {
      display: flex;
      font-size: 14px;
      padding-top: 8px;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #33cc33;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .line {
      margin: 2px 0;
    }

    function clearAndRestart() {
      output.innerHTML = '';
      cmdIndex = 0;
      charIndex = 0;
      setTimeout(typeCommand, 1000);
    }

    function typeCommand() {
      if (cmdIndex >= commands.length) {
        setTimeout(clearAndRestart, 2000);
        return;
      }

      const cmd = commands[cmdIndex];

      if (cmd.paste) {
        // Type the command prefix slowly, then paste the hash portion instantly
        const pasteAt = cmd.text.indexOf(' -hashes ') + ' -hashes '.length;
        const prefix = cmd.text.substring(0, pasteAt);
        const pasted = cmd.text.substring(pasteAt);
        if (charIndex < prefix.length) {
          if (charIndex === 0) output.lastChild.textContent += cmd.text[0];
          else output.lastChild.textContent += prefix[charIndex];
          charIndex++;
          setTimeout(typeCommand, 80 + Math.random() * 120);
        } else if (charIndex === prefix.length) {
          // Paste the hash in one shot
          output.lastChild.textContent += pasted;
          charIndex++;
          setTimeout(typeCommand, 300);
        } else {
          const lineBreak = document.createElement('div');
          lineBreak.className = 'line';
          output.appendChild(lineBreak);
          charIndex = 0;
          cmdIndex++;
          setTimeout(typeCommand, cmd.delay);
        }
      } else if (cmd.typed) {
        if (charIndex === 0) {
          currentLine = document.createElement('span');
          currentLine.textContent = cmd.text.substring(0, 1);
          output.lastChild.textContent += currentLine.textContent;
          charIndex = 1;
          setTimeout(typeCommand, 80 + Math.random() * 120);
        } else if (charIndex < cmd.text.length) {
          output.lastChild.textContent += cmd.text[charIndex];
          charIndex++;
          setTimeout(typeCommand, 80 + Math.random() * 120);
        } else {
          const lineBreak = document.createElement('div');
          lineBreak.className = 'line';
          output.appendChild(lineBreak);
          charIndex = 0;
          cmdIndex++;
          setTimeout(typeCommand, cmd.delay);
        }
      } else {
        const line = document.createElement('div');
        line.className = 'line';
        line.textContent = cmd.text;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
        cmdIndex++;
        setTimeout(typeCommand, cmd.delay);
      }
    }
